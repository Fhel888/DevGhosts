<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Setores | ERP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">BlessFuture</a>
        </div>
    </header>

    <div class="page-container">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <h2>Navegação ERP</h2>
                <ul>
                    <li><a href="index.html">🏠 Home</a></li>
                    <li><a href="processos.html">📁 Processos</a></li>
                    <li><a href="clientes.html">👥 Clientes</a></li>
                    <li><a href="setores.html">🏢 Setores</a></li>
                    <li><a href="usuarios.html">👽 Funcionários </a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="container">
                <div class="page-header">
                    <h1>Painel de Setores</h1>
                    <button id="add-sector-btn" class="btn-primary">Cadastrar Setor</button>
                </div>
                
                <div class="list-view-container">
                    <div class="list-header">
                        <span>Nome do Setor</span>
                        <span>Responsável</span>
                        <span>Nº de Funcionários</span>
                    </div>
                    <ul id="sector-list">
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <div id="add-sector-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Cadastrar Novo Setor</h2>
                <button id="close-add-modal-btn" class="close-modal">&times;</button>
            </div>
            <form id="add-sector-form" class="modal-body">
                <div class="form-group">
                    <label for="sector-name">Nome do Setor</label>
                    <input type="text" id="sector-name" name="nome" placeholder="Ex: Tecnologia da Informação" required>
                </div>
                <div class="form-group">
                    <label for="sector-responsible">Responsável pelo Setor</label>
                    <input type="text" id="sector-responsible" name="responsavel" placeholder="Ex: João da Silva" required>
                </div>
                <div class="form-group">
                    <label for="sector-description">Descrição</label>
                    <textarea id="sector-description" name="descricao" rows="3" placeholder="Breve descrição das atividades do setor..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancel-add-btn" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Setor</button>
                </div>
            </form>
        </div>
    </div>

    <div id="sector-details-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="detail-sector-name"></h2>
                <button id="close-details-modal-btn" class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <h3>Funcionários do Setor</h3>
                <ul id="detail-user-list"></ul>
            </div>
            <div class="modal-footer">
                <button id="delete-sector-btn" class="btn-danger">Excluir Setor</button>
            </div>
        </div>
    </div>

    <script src="setores.js" defer></script>
</body>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2025 Simulador ERP. Designed by DevGhosts</p>
        </div>
    </footer>
</html>
